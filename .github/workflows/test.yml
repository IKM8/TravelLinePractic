name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm test

  api:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: tl_user
      POSTGRES_PASSWORD: tl_pass
      POSTGRES_DB: travelline
      DATABASE_URL: postgres://tl_user:tl_pass@db:5432/travelline
      ADMIN_EMAIL: admin@travelline.tech
      ADMIN_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v4
      - name: Start Docker
        run: docker compose up --build -d
      - name: Run API smoke test
        run: |
          sleep 10
          docker compose exec -T -e ADMIN_EMAIL -e ADMIN_PASSWORD app node server/api-test.mjs
      - name: Stop Docker
        if: always()
        run: docker compose down
