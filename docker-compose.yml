services:
  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tl_user:tl_pass@db:5432/travelline
      PORT: "5000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tl_user
      POSTGRES_PASSWORD: tl_pass
      POSTGRES_DB: travelline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tl_user -d travelline"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
